<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>map_tools Zone Editor</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
  <style>
    :root {
      --bg: #0a0f1a;
      --panel: #111827;
      --line: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22d3ee;
      --good: #22c55e;
      --bad: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at 20% 0%, #1b2742, var(--bg));
      color: var(--text);
    }
    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 12px;
      height: 100vh;
      padding: 12px;
    }
    .panel {
      background: linear-gradient(180deg, #0d1423, var(--panel));
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      overflow: auto;
    }
    .panel h2 {
      margin: 0 0 8px 0;
      font-size: 16px;
      font-weight: 700;
    }
    .row { display: flex; gap: 8px; margin-bottom: 8px; }
    .stack { display: flex; flex-direction: column; gap: 8px; }
    input, button, select, textarea {
      font: inherit;
      border-radius: 8px;
      border: 1px solid #2d3a51;
      background: #030712;
      color: var(--text);
      padding: 8px 10px;
      width: 100%;
    }
    textarea { min-height: 120px; }
    button {
      cursor: pointer;
      background: linear-gradient(180deg, #67e8f9, var(--accent));
      color: #03202b;
      border: 0;
      font-weight: 700;
      width: auto;
    }
    button.secondary {
      background: #334155;
      color: var(--text);
      border: 1px solid #475569;
      font-weight: 600;
    }
    button.secondary.active {
      background: #dc2626;
      border-color: #991b1b;
      color: #fecaca;
    }
    button.secondary.manual-on {
      background: #166534;
      border-color: #14532d;
      color: #dcfce7;
    }
    button.danger {
      background: linear-gradient(180deg, #ef4444, #b91c1c);
      color: #fef2f2;
      border: 1px solid #7f1d1d;
      font-weight: 700;
    }
    .status { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }
    #viewStage {
      position: relative;
      width: 100%;
      height: calc(100vh - 24px);
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #020617;
      overflow: hidden;
    }
    .view-pane {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #020617;
      transition: all 180ms ease;
    }
    #cameraPane {
      z-index: 10;
      border: 0;
      border-radius: 0;
    }
    #cameraFrame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }
    #gpsPane {
      z-index: 1100;
      box-shadow: 0 10px 28px rgba(2, 6, 23, 0.55);
    }
    #map {
      width: 100%;
      height: 100%;
    }
    #swapViewBtn {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 1300;
      width: auto;
      backdrop-filter: blur(2px);
    }
    #viewStage.mode-camera-main #cameraPane {
      inset: 0;
      z-index: 10;
      border: 0;
      border-radius: 0;
    }
    #viewStage.mode-camera-main #gpsPane {
      top: auto;
      left: auto;
      right: 14px;
      bottom: 14px;
      width: 600px;
      height: 388px;
      opacity: 0.97;
      pointer-events: none;
    }
    #viewStage.mode-gps-main #gpsPane {
      inset: 0;
      z-index: 10;
      border: 0;
      border-radius: 0;
      opacity: 1;
      pointer-events: auto;
      box-shadow: none;
    }
    #viewStage.mode-gps-main #cameraPane {
      top: auto;
      left: auto;
      right: 14px;
      bottom: 14px;
      width: 600px;
      height: 388px;
      z-index: 1100;
      border: 1px solid #334155;
      border-radius: 10px;
      box-shadow: 0 10px 28px rgba(2, 6, 23, 0.55);
      opacity: 0.97;
    }
    .zone-list {
      margin: 0;
      padding: 0;
      list-style: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .zone-list li {
      padding: 8px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .zone-list li:last-child { border-bottom: 0; }
    .badge { padding: 2px 6px; border-radius: 999px; font-size: 11px; }
    .on { background: #14532d; color: #dcfce7; }
    .off { background: #3f3f46; color: #e4e4e7; }
    .wp-icon {
      width: 30px;
      height: 30px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: 50% 50%;
    }
    .wp-icon .wp-arrow {
      width: 0;
      height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-bottom: 15px solid #ef4444;
      filter: drop-shadow(0 0 2px rgba(2, 6, 23, 0.7));
    }
    .wp-icon .wp-index {
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-weight: 700;
      color: #f8fafc;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid #475569;
      border-radius: 999px;
      padding: 0 5px;
      line-height: 14px;
      min-width: 16px;
      text-align: center;
    }
    .wp-icon.draft .wp-arrow {
      border-bottom-color: #f59e0b;
      opacity: 0.9;
    }
    .ptz-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }
    .ptz-grid button {
      width: 100%;
      text-align: center;
      font-weight: 700;
      background: #334155;
      border: 1px solid #475569;
      color: #e2e8f0;
    }
    .ptz-grid button:hover {
      background: #475569;
    }
    pre {
      margin: 0;
      max-height: 200px;
      overflow: auto;
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 8px;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 16px;
    }
    .modal-backdrop.show { display: flex; }
    .modal-card {
      width: min(920px, 96vw);
      max-height: 92vh;
      background: linear-gradient(180deg, #0b1220, #111827);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px;
      overflow: auto;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 8px;
    }
    .modal-header h3 {
      margin: 0;
      font-size: 15px;
    }
    #snapshotImage {
      width: 100%;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0b1220;
    }
    #snapshotMeta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }
    @media (max-width: 1080px) {
      .layout { grid-template-columns: 1fr; height: auto; }
      #viewStage { height: 60vh; }
      #swapViewBtn {
        bottom: 10px;
        left: 10px;
      }
      #viewStage.mode-camera-main #gpsPane,
      #viewStage.mode-gps-main #cameraPane {
        width: 42vw;
        height: 28vw;
        min-width: 180px;
        min-height: 120px;
        max-width: 300px;
        max-height: 200px;
        right: 10px;
        bottom: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="panel">
      <h2>Connection</h2>
      <div class="stack">
        <input id="wsUrl" value="ws://100.111.4.7:8766" />
        <div class="row">
          <button id="connectBtn">Connect</button>
          <button id="disconnectBtn" class="secondary">Disconnect</button>
        </div>
        <div id="status" class="status">Disconnected</div>
      </div>

      <h2>Zones</h2>
      <div class="row">
        <button id="refreshBtn" class="secondary">Refresh</button>
        <button id="saveBtn" class="secondary">Save File</button>
        <button id="loadBtn" class="secondary">Load File</button>
      </div>
      <div class="row">
        <button id="pushBtn">Push To Server</button>
        <button id="clearBtn" class="secondary">Clear All</button>
      </div>
      <div class="row">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;">
          <input id="autoSync" type="checkbox" checked style="width:auto;" /> Auto-sync edits
        </label>
      </div>
      <ul id="zoneList" class="zone-list"></ul>

      <h2>Navigation</h2>
      <div class="stack">
        <div class="row">
          <button id="goalModeBtn" class="secondary">Waypoint Mode</button>
          <button id="sendGoalsBtn" class="secondary" disabled>Send Waypoints</button>
          <button id="clearGoalsBtn" class="secondary" disabled>Clear Waypoints</button>
          <button id="cancelGoalBtn" class="secondary">Cancel Goal</button>
        </div>
        <div class="row">
          <button id="manualModeBtn" class="secondary">Manual Control: OFF</button>
          <button id="snapshotBtn" class="secondary">Snapshot Nav</button>
        </div>
        <div class="stack" style="gap:4px;">
          <label style="font-size:13px;">
            Linear speed max: <span id="manualLinearValue">1.20</span> m/s
          </label>
          <input id="manualLinearSlider" type="range" min="1.0" max="4.0" step="0.01" value="1.20" />
          <label style="font-size:13px;">
            Angular speed max: <span id="manualAngularValue">0.40</span> rad/s
          </label>
          <input id="manualAngularSlider" type="range" min="0.1" max="0.4" step="0.01" value="0.40" />
        </div>
        <div id="goalStatus" class="status">No active goal</div>
        <div id="waypointStatus" class="status">Waypoints: 0</div>
        <div id="cmdVelSafeStatus" class="status">cmd_vel_safe: n/a</div>
        <div id="manualStatus" class="status">Manual: OFF · keys=- · vx_cmd=0.00 · wz_cmd=0.00</div>
      </div>

      <h2>Camera PTZ</h2>
      <div class="stack">
        <div class="ptz-grid">
          <button id="ptz_angle_135" class="secondary" type="button">⇖</button>
          <button id="ptz_angle_90" class="secondary" type="button">⇑</button>
          <button id="ptz_angle_45" class="secondary" type="button">⇗</button>

          <button id="ptz_angle_180" class="secondary" type="button">⇐</button>
          <button id="ptz_center_zoom" class="secondary" type="button">🔍</button>
          <button id="ptz_angle_0" class="secondary" type="button">⇒</button>

          <button id="ptz_angle_m135" class="secondary" type="button">⇙</button>
          <button id="ptz_angle_m90" class="secondary" type="button">⇓</button>
          <button id="ptz_angle_m45" class="secondary" type="button">⇘</button>
        </div>
        <div id="cameraStatus" class="status">camera: n/a</div>
      </div>

    </div>

    <div id="viewStage" class="mode-camera-main">
      <div id="cameraPane" class="view-pane">
        <iframe id="cameraFrame" title="Camera feed" loading="lazy"></iframe>
      </div>
      <div id="gpsPane" class="view-pane">
        <div id="map"></div>
      </div>
      <button id="swapViewBtn" class="secondary" type="button">Ver GPS grande</button>
    </div>
  </div>

  <div id="snapshotModal" class="modal-backdrop">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Navigation Snapshot</h3>
        <button id="snapshotCloseBtn" class="secondary">Close</button>
      </div>
      <img id="snapshotImage" alt="nav snapshot" />
      <div id="snapshotMeta">No snapshot loaded.</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <script>
    const CAMERA_IFRAME_URL = 'http://100.111.4.7:8889/cam3/';
    const GPS_MAX_ZOOM = 22;
    const GPS_DEFAULT_ZOOM = GPS_MAX_ZOOM - 3;
    const map = L.map('map', { zoomControl: true }).setView(
      [-31.421785, -64.102448],
      GPS_DEFAULT_ZOOM
    );
    const satelliteLayer = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      {
        maxZoom: GPS_MAX_ZOOM,
        attribution: 'Tiles &copy; Esri'
      }
    );
    satelliteLayer.addTo(map);

    const drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    const drawControl = new L.Control.Draw({
      edit: {
        featureGroup: drawnItems,
        remove: true,
      },
      draw: {
        polygon: {
          allowIntersection: false,
          showArea: true,
          shapeOptions: { color: '#f97316', weight: 3 }
        },
        rectangle: false,
        polyline: false,
        circle: false,
        circlemarker: false,
        marker: false
      }
    });
    map.addControl(drawControl);
    const goalLayer = L.layerGroup();
    map.addLayer(goalLayer);

    const state = {
      ws: null,
      connected: false,
      seqZoneId: 1,
      frameId: 'map',
      lastZones: [],
      robotMarker: null,
      primaryView: 'camera',
      goalMode: false,
      goalWaypoints: [],
      goalDraft: null,
      lastSnapshot: null,
      cmdVelSafe: null,
      cameraStatus: { ok: false, error: 'camera status unavailable', last_command: 'none', zoom_in: false },
      cameraArrowKeys: { up: false, down: false, left: false, right: false },
      cameraArrowTimer: null,
      manualControl: { enabled: false, linear_x_cmd: 0.0, angular_z_cmd: 0.0, last_cmd_age_s: null },
      manualKeys: { w: false, a: false, s: false, d: false },
      manualCmd: { linearX: 0.0, angularZ: 0.0 },
      manualLoopTimer: null
    };

    const MANUAL_LOOP_HZ = 20.0;

    function setStatus(text, ok = null) {
      const s = document.getElementById('status');
      s.textContent = text;
      s.className = 'status';
      if (ok === true) s.classList.add('good');
      if (ok === false) s.classList.add('bad');
    }

    function isGpsMainView() {
      return state.primaryView === 'gps';
    }

    function normalizeYawDeg(yawDeg) {
      let yaw = Number(yawDeg || 0.0);
      while (yaw <= -180.0) yaw += 360.0;
      while (yaw > 180.0) yaw -= 360.0;
      return yaw;
    }

    function yawDegFromLatLng(origin, target) {
      const dx = Number(target.lng) - Number(origin.lng);
      const dy = Number(target.lat) - Number(origin.lat);
      const yawDeg = Math.atan2(dy, dx) * 180.0 / Math.PI;
      return normalizeYawDeg(yawDeg);
    }

    function buildWaypointIcon(index, yawDeg, draft = false) {
      const yaw = normalizeYawDeg(yawDeg);
      const cls = draft ? 'wp-icon draft' : 'wp-icon';
      return L.divIcon({
        className: '',
        html:
          `<div class="${cls}" style="transform: rotate(${yaw}deg);">` +
            '<div class="wp-arrow"></div>' +
            `<div class="wp-index">${Number(index) + 1}</div>` +
          '</div>',
        iconSize: [30, 30],
        iconAnchor: [15, 15]
      });
    }

    function updateWaypointStatus(text = null, ok = null) {
      const statusEl = document.getElementById('waypointStatus');
      if (typeof text === 'string') {
        statusEl.textContent = text;
      } else {
        statusEl.textContent = `Waypoints: ${state.goalWaypoints.length}`;
      }
      statusEl.className = 'status';
      if (ok === true) statusEl.classList.add('good');
      if (ok === false) statusEl.classList.add('bad');
    }

    function renderGoalWaypoints() {
      goalLayer.clearLayers();
      state.goalWaypoints.forEach((wp, idx) => {
        const marker = L.marker([wp.lat, wp.lon], {
          icon: buildWaypointIcon(idx, wp.yaw_deg, false),
          interactive: false
        });
        goalLayer.addLayer(marker);
      });
      if (state.goalDraft) {
        const draft = state.goalDraft;
        const marker = L.marker([draft.lat, draft.lon], {
          icon: buildWaypointIcon(state.goalWaypoints.length, draft.yaw_deg, true),
          interactive: false
        });
        goalLayer.addLayer(marker);
      }
    }

    function updateGoalButtonsState() {
      const hasWaypoints = state.goalWaypoints.length > 0;
      document.getElementById('sendGoalsBtn').disabled = !hasWaypoints;
      document.getElementById('clearGoalsBtn').disabled = !hasWaypoints;
    }

    function setGoalModeUi(enabled) {
      state.goalMode = enabled === true;
      const btn = document.getElementById('goalModeBtn');
      if (state.goalMode) {
        btn.textContent = 'Waypoint Mode - ACTIVE';
        btn.classList.add('active');
        map.getContainer().style.cursor = 'crosshair';
        updateWaypointStatus(
          'Waypoint mode activo: click+arrastre para fijar yaw de cada waypoint',
          true
        );
      } else {
        btn.textContent = 'Waypoint Mode';
        btn.classList.remove('active');
        map.getContainer().style.cursor = '';
      }
    }

    function addWaypoint(lat, lon, yawDeg) {
      state.goalWaypoints.push({
        lat: Number(lat),
        lon: Number(lon),
        yaw_deg: normalizeYawDeg(yawDeg)
      });
      renderGoalWaypoints();
      updateGoalButtonsState();
      updateWaypointStatus();
    }

    function clearWaypoints() {
      state.goalWaypoints = [];
      state.goalDraft = null;
      renderGoalWaypoints();
      updateGoalButtonsState();
      updateWaypointStatus();
    }

    function sendCurrentWaypoints() {
      if (state.manualControl.enabled) {
        setStatus('Disable manual control before sending waypoints', false);
        return;
      }
      if (state.goalWaypoints.length === 0) {
        updateWaypointStatus('Add at least one waypoint before sending', false);
        return;
      }
      const payloadWaypoints = state.goalWaypoints.map((wp) => ({
        lat: Number(wp.lat),
        lon: Number(wp.lon),
        yaw_deg: Number(wp.yaw_deg || 0.0)
      }));
      const loopEnabled = payloadWaypoints.length > 1;
      send({
        op: 'set_goal_ll',
        waypoints: payloadWaypoints,
        loop: loopEnabled
      });
    }

    function startGoalDraft(latlng) {
      state.goalDraft = {
        lat: Number(latlng.lat),
        lon: Number(latlng.lng),
        yaw_deg: 0.0,
        dragYaw: false
      };
      if (map.dragging.enabled()) {
        map.dragging.disable();
      }
      renderGoalWaypoints();
    }

    function updateGoalDraft(latlng) {
      if (!state.goalDraft) return;
      const origin = L.latLng(state.goalDraft.lat, state.goalDraft.lon);
      const distanceM = map.distance(origin, latlng);
      const dragYaw = distanceM > 0.35;
      state.goalDraft.dragYaw = dragYaw;
      if (dragYaw) {
        state.goalDraft.yaw_deg = yawDegFromLatLng(origin, latlng);
      }
      renderGoalWaypoints();
    }

    function finishGoalDraft() {
      if (!state.goalDraft) return;
      const draft = state.goalDraft;
      addWaypoint(draft.lat, draft.lon, draft.yaw_deg);
      state.goalDraft = null;
      renderGoalWaypoints();
      if (!map.dragging.enabled()) {
        map.dragging.enable();
      }
    }

    function cancelGoalDraft() {
      if (!state.goalDraft) return;
      state.goalDraft = null;
      renderGoalWaypoints();
      if (!map.dragging.enabled()) {
        map.dragging.enable();
      }
    }

    function applyViewMode() {
      const stage = document.getElementById('viewStage');
      const swapBtn = document.getElementById('swapViewBtn');
      const gpsMain = isGpsMainView();

      stage.classList.toggle('mode-camera-main', !gpsMain);
      stage.classList.toggle('mode-gps-main', gpsMain);
      swapBtn.textContent = gpsMain ? 'Ver cámara grande' : 'Ver GPS grande';

      if (!gpsMain && state.goalMode) {
        cancelGoalDraft();
        setGoalModeUi(false);
        const goalStatusEl = document.getElementById('goalStatus');
        goalStatusEl.textContent = 'GPS en minimapa: intercambiá a GPS grande para editar waypoints';
        goalStatusEl.className = 'status';
      }

      window.requestAnimationFrame(() => {
        map.invalidateSize(false);
        window.setTimeout(() => map.invalidateSize(false), 120);
      });
    }

    function logEvent(obj, dir = 'info') {
      const pre = document.getElementById('events');
      const text = typeof obj === 'string' ? obj : JSON.stringify(obj);
      const line = `[${new Date().toISOString()}][${dir}] ${text}`;
      if (dir === 'error') {
        console.error(line);
      } else if (dir === 'warn') {
        console.warn(line);
      } else {
        console.log(line);
      }
      if (!pre) return;
      pre.textContent += `${line}\n`;
      pre.scrollTop = pre.scrollHeight;
    }

    function summarizeIncomingMessage(msg) {
      if (msg && msg.op === 'nav_snapshot') {
        return {
          op: msg.op,
          ok: msg.ok,
          width: msg.width,
          height: msg.height,
          frame_id: msg.frame_id,
          image_size_bytes: msg.image_size_bytes,
          layers: msg.layers,
          error: msg.error || null
        };
      }
      if (msg && msg.op === 'nav_telemetry') {
        return {
          op: msg.op,
          cmd_vel_safe: msg.cmd_vel_safe
            ? {
                linear_x: msg.cmd_vel_safe.linear_x,
                angular_z: msg.cmd_vel_safe.angular_z
              }
            : null,
          manual_control: msg.manual_control
            ? {
                enabled: msg.manual_control.enabled,
                linear_x_cmd: msg.manual_control.linear_x_cmd,
                angular_z_cmd: msg.manual_control.angular_z_cmd
              }
            : null
        };
      }
      if (msg && msg.op === 'camera_status') {
        return {
          op: msg.op,
          ok: msg.ok,
          last_command: msg.last_command,
          zoom_in: msg.zoom_in,
          error: msg.error || null
        };
      }
      return msg;
    }

    function updateCameraStatusUi(payload) {
      const el = document.getElementById('cameraStatus');
      const status = payload && typeof payload === 'object' ? payload : {};
      state.cameraStatus = {
        ok: status.ok === true,
        error: String(status.error || ''),
        last_command: String(status.last_command || 'none'),
        zoom_in: status.zoom_in === true
      };

      if (state.cameraStatus.ok) {
        const zoomText = state.cameraStatus.zoom_in ? 'IN' : 'OUT';
        el.textContent = `camera: ok · last=${state.cameraStatus.last_command} · zoom=${zoomText}`;
        el.className = 'status good';
      } else {
        const err = state.cameraStatus.error || 'camera unavailable';
        el.textContent = `camera: ${err}`;
        el.className = 'status bad';
      }
    }

    function updateNavTelemetry(payload) {
      const cmdVel = payload && payload.cmd_vel_safe ? payload.cmd_vel_safe : null;
      state.cmdVelSafe = cmdVel;

      const cmdEl = document.getElementById('cmdVelSafeStatus');
      if (cmdVel && cmdVel.available === true) {
        const vx = Number(cmdVel.linear_x || 0).toFixed(2);
        const wz = Number(cmdVel.angular_z || 0).toFixed(2);
        cmdEl.textContent = `cmd_vel_safe: vx=${vx} m/s, wz=${wz} rad/s`;
        cmdEl.className = 'status';
      } else {
        cmdEl.textContent = 'cmd_vel_safe: n/a';
        cmdEl.className = 'status';
      }

      if (payload && payload.manual_control) {
        syncManualControlFromServer(payload.manual_control);
      }
    }

    function isTextInputFocused() {
      const active = document.activeElement;
      if (!active) return false;
      const tag = (active.tagName || '').toUpperCase();
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return true;
      return active.isContentEditable === true;
    }

    function manualKeysSummary() {
      const keys = [];
      if (state.manualKeys.w) keys.push('W');
      if (state.manualKeys.a) keys.push('A');
      if (state.manualKeys.s) keys.push('S');
      if (state.manualKeys.d) keys.push('D');
      return keys.length > 0 ? keys.join('') : '-';
    }

    function updateManualSliderLabels() {
      const linear = Number(document.getElementById('manualLinearSlider').value || 1.2);
      const angular = Number(document.getElementById('manualAngularSlider').value || 0.4);
      document.getElementById('manualLinearValue').textContent = linear.toFixed(2);
      document.getElementById('manualAngularValue').textContent = angular.toFixed(2);
    }

    function renderManualStatus() {
      const manual = state.manualControl || { enabled: false, linear_x_cmd: 0.0, angular_z_cmd: 0.0 };
      const enabled = manual.enabled === true;
      const btn = document.getElementById('manualModeBtn');
      btn.textContent = enabled ? 'Manual Control: ON' : 'Manual Control: OFF';
      btn.classList.toggle('manual-on', enabled);

      const vx = Number(state.manualCmd.linearX || 0).toFixed(2);
      const wz = Number(state.manualCmd.angularZ || 0).toFixed(2);
      const status = document.getElementById('manualStatus');
      status.textContent = `Manual: ${enabled ? 'ON' : 'OFF'} · keys=${manualKeysSummary()} · vx_cmd=${vx} · wz_cmd=${wz}`;
      status.className = enabled ? 'status good' : 'status';
    }

    function stopManualLoop() {
      if (state.manualLoopTimer) {
        window.clearInterval(state.manualLoopTimer);
        state.manualLoopTimer = null;
      }
    }

    function resetManualLocalState() {
      state.manualKeys.w = false;
      state.manualKeys.a = false;
      state.manualKeys.s = false;
      state.manualKeys.d = false;
      state.manualCmd.linearX = 0.0;
      state.manualCmd.angularZ = 0.0;
    }

    function sendManualCmd(linearX, angularZ) {
      if (!state.manualControl.enabled) return;
      if (!state.ws || state.ws.readyState !== WebSocket.OPEN) return;
      send({ op: 'set_manual_cmd', linear_x: linearX, angular_z: angularZ });
    }

    function manualEmergencyStop() {
      state.manualCmd.linearX = 0.0;
      state.manualCmd.angularZ = 0.0;
      sendManualCmd(0.0, 0.0);
      renderManualStatus();
    }

    function manualControlTick() {
      if (!state.manualControl.enabled) return;

      const linearMax = Number(document.getElementById('manualLinearSlider').value || 1.2);
      const angularMax = Number(document.getElementById('manualAngularSlider').value || 0.4);

      const forward = state.manualKeys.w;
      const reverse = state.manualKeys.s;
      const left = state.manualKeys.a;
      const right = state.manualKeys.d;

      let targetLinear = 0.0;
      if (forward && !reverse) targetLinear = linearMax;
      if (reverse && !forward) targetLinear = -linearMax;

      let targetAngular = 0.0;
      if (left && !right) targetAngular = angularMax;
      if (right && !left) targetAngular = -angularMax;
      if (targetLinear < 0.0) targetAngular = -targetAngular;

      state.manualCmd.linearX = targetLinear;
      state.manualCmd.angularZ = targetAngular;

      if (Math.abs(state.manualCmd.linearX) < 1e-3) state.manualCmd.linearX = 0.0;
      if (Math.abs(state.manualCmd.angularZ) < 1e-3) state.manualCmd.angularZ = 0.0;

      sendManualCmd(state.manualCmd.linearX, state.manualCmd.angularZ);
      renderManualStatus();
    }

    function startManualLoop() {
      stopManualLoop();
      state.manualLoopTimer = window.setInterval(
        manualControlTick,
        Math.round(1000.0 / MANUAL_LOOP_HZ)
      );
    }

    function syncManualControlFromServer(manual) {
      if (!manual || typeof manual !== 'object') return;
      state.manualControl = {
        enabled: manual.enabled === true,
        linear_x_cmd: Number(manual.linear_x_cmd || 0.0),
        angular_z_cmd: Number(manual.angular_z_cmd || 0.0),
        last_cmd_age_s: manual.last_cmd_age_s == null ? null : Number(manual.last_cmd_age_s)
      };

      if (!state.manualControl.enabled) {
        stopManualLoop();
        resetManualLocalState();
      } else if (!state.manualLoopTimer) {
        startManualLoop();
      }
      renderManualStatus();
    }

    function send(payload) {
      if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
        setStatus('WebSocket not connected', false);
        return;
      }
      state.ws.send(JSON.stringify(payload));
      if (!(payload && payload.op === 'set_manual_cmd')) {
        logEvent(payload, 'tx');
      }
    }

    function cameraAngleFromArrowSnapshot(keys) {
      if (keys.up && keys.left) return 135;
      if (keys.up && keys.right) return 45;
      if (keys.down && keys.left) return -135;
      if (keys.down && keys.right) return -45;
      if (keys.up) return 90;
      if (keys.down) return -90;
      if (keys.left) return 180;
      if (keys.right) return 0;
      return null;
    }

    function scheduleCameraArrowCommand() {
      if (state.cameraArrowTimer) {
        window.clearTimeout(state.cameraArrowTimer);
        state.cameraArrowTimer = null;
      }
      const snapshot = {
        up: state.cameraArrowKeys.up,
        down: state.cameraArrowKeys.down,
        left: state.cameraArrowKeys.left,
        right: state.cameraArrowKeys.right,
      };
      state.cameraArrowTimer = window.setTimeout(() => {
        state.cameraArrowTimer = null;
        const angle = cameraAngleFromArrowSnapshot(snapshot);
        if (Number.isFinite(angle)) {
          send({ op: 'camera_pan', angle });
        }
      }, 90);
    }

    function connectWs() {
      const url = document.getElementById('wsUrl').value.trim();
      state.ws = new WebSocket(url);

      state.ws.onopen = () => {
        state.connected = true;
        setStatus(`Connected to ${url}`, true);
        send({ op: 'get_state' });
        send({ op: 'get_camera_status' });
      };

      state.ws.onclose = () => {
        state.connected = false;
        setStatus('Disconnected', false);
        stopManualLoop();
        resetManualLocalState();
        state.manualControl.enabled = false;
        renderManualStatus();
        updateCameraStatusUi({ ok: false, error: 'disconnected', last_command: state.cameraStatus.last_command, zoom_in: state.cameraStatus.zoom_in });
      };

      state.ws.onerror = () => {
        setStatus('WebSocket error', false);
      };

      state.ws.onmessage = (ev) => {
        let msg;
        try {
          msg = JSON.parse(ev.data);
        } catch (err) {
          logEvent(`invalid json from server: ${ev.data}`, 'rx');
          return;
        }
        if (
          msg.op !== 'nav_telemetry' &&
          !(msg.op === 'ack' && msg.request === 'set_manual_cmd')
        ) {
          logEvent(summarizeIncomingMessage(msg), 'rx');
        }
        handleServerMessage(msg);
      };
    }

    function disconnectWs() {
      if (state.ws && state.ws.readyState === WebSocket.OPEN && state.manualControl.enabled) {
        send({ op: 'set_manual_mode', enabled: false });
      }
      if (state.ws) {
        state.ws.close();
      }
      stopManualLoop();
      resetManualLocalState();
      state.manualControl.enabled = false;
      renderManualStatus();
    }

    function handleServerMessage(msg) {
      if (msg.op === 'state' && msg.ok === true) {
        state.frameId = msg.frame_id || 'map';
        const zones = Array.isArray(msg.zones) ? msg.zones : [];
        state.lastZones = zones;
        renderMapFromZones(zones);
        updateRobotPose(msg.robot_pose || null);
        renderZoneList({ zones });
        const maskSource = msg.mask_source || 'map';
        const maskReady = msg.mask_ready === true;
        const maskReadyText = maskReady ? 'mask ready' : 'mask not ready';
        setStatus(`state updated (${maskReadyText}, source=${maskSource})`, maskReady);
        updateNavTelemetry({ cmd_vel_safe: msg.cmd_vel_safe });
        syncManualControlFromServer(msg.manual_control || null);
        if (msg.camera_status) {
          updateCameraStatusUi(msg.camera_status);
        }
        return;
      }

      if (msg.op === 'robot_pose') {
        updateRobotPose(msg.pose || null);
        return;
      }

      if (msg.op === 'nav_telemetry') {
        updateNavTelemetry(msg);
        syncManualControlFromServer(msg.manual_control || null);
        return;
      }

      if (msg.op === 'nav_snapshot') {
        const metaEl = document.getElementById('snapshotMeta');
        if (msg.ok === true && typeof msg.image_b64 === 'string' && msg.image_b64.length > 0) {
          state.lastSnapshot = msg;
          const img = document.getElementById('snapshotImage');
          img.src = `data:${msg.mime || 'image/png'};base64,${msg.image_b64}`;
          const layers = msg.layers || {};
          const activeLayers = Object.entries(layers)
            .filter((entry) => entry[1] === true)
            .map((entry) => entry[0])
            .join(', ');
          const stamp = msg.stamp ? `${msg.stamp.sec}.${String(msg.stamp.nanosec || 0).padStart(9, '0')}` : 'n/a';
          metaEl.textContent =
            `frame=${msg.frame_id || 'n/a'} · size=${msg.width || 0}x${msg.height || 0} · ` +
            `png=${msg.image_size_bytes || 0} bytes · stamp=${stamp} · layers=${activeLayers || 'none'}`;
          document.getElementById('snapshotModal').classList.add('show');
          return;
        }
        metaEl.textContent = `Snapshot error: ${msg.error || 'unknown error'}`;
        document.getElementById('snapshotModal').classList.add('show');
        return;
      }

      if (msg.op === 'camera_status') {
        updateCameraStatusUi(msg);
        return;
      }

      if (msg.op === 'ack') {
        const goalStatusEl = document.getElementById('goalStatus');
        if (msg.request === 'set_goal_ll') {
          if (msg.ok) {
            const count = Number(msg.waypoint_count || state.goalWaypoints.length || 1);
            const loopUsed = msg.loop === true;
            if (count > 1 && loopUsed) {
              goalStatusEl.textContent = `Route sent (${count} waypoints) — looping navigation active`;
            } else if (count > 1) {
              goalStatusEl.textContent = `Route sent (${count} waypoints)`;
            } else {
              goalStatusEl.textContent = 'Goal sent — navigating...';
            }
            goalStatusEl.className = 'status good';
          } else {
            goalStatusEl.textContent = `Goal failed: ${msg.error || 'error'}`;
            goalStatusEl.className = 'status bad';
          }
        } else if (msg.request === 'cancel_goal') {
          if (msg.ok) {
            goalStatusEl.textContent = 'Goal cancelled';
            goalStatusEl.className = 'status';
          } else {
            goalStatusEl.textContent = `Cancel failed: ${msg.error || 'error'}`;
            goalStatusEl.className = 'status bad';
          }
        } else if (msg.request === 'set_manual_mode') {
          if (msg.ok) {
            const enabled = msg.enabled === true;
            state.manualControl.enabled = enabled;
            if (enabled) {
              goalStatusEl.textContent = 'Manual control enabled';
              goalStatusEl.className = 'status good';
              cancelGoalDraft();
              setGoalModeUi(false);
              startManualLoop();
            } else {
              goalStatusEl.textContent = 'Manual control disabled';
              goalStatusEl.className = 'status';
              stopManualLoop();
              resetManualLocalState();
            }
            renderManualStatus();
          } else {
            goalStatusEl.textContent = `Manual mode failed: ${msg.error || 'error'}`;
            goalStatusEl.className = 'status bad';
          }
        } else if (msg.request === 'set_manual_cmd') {
          if (!msg.ok) {
            goalStatusEl.textContent = `Manual command failed: ${msg.error || 'error'}`;
            goalStatusEl.className = 'status bad';
          }
        } else if (msg.request === 'camera_pan' || msg.request === 'camera_zoom_toggle') {
          if (msg.ok) {
            send({ op: 'get_camera_status' });
          } else {
            updateCameraStatusUi({
              ok: false,
              error: String(msg.error || 'camera command failed'),
              last_command: state.cameraStatus.last_command,
              zoom_in: state.cameraStatus.zoom_in
            });
          }
        } else {
          if (msg.ok) {
            const published = msg.published ? 'published' : 'not published';
            setStatus(`${msg.request || 'request'} ok (${published})`, msg.published);
            send({ op: 'get_state' });
          } else {
            setStatus(`${msg.request || 'request'} failed: ${msg.error || 'error'}`, false);
          }
        }
      }
    }

    function updateRobotPose(pose) {
      const hasPose = pose && Number.isFinite(pose.lat) && Number.isFinite(pose.lon);
      if (!hasPose) {
        if (state.robotMarker) {
          map.removeLayer(state.robotMarker);
          state.robotMarker = null;
        }
        return;
      }

      const latLng = [pose.lat, pose.lon];
      if (!state.robotMarker) {
        state.robotMarker = L.circleMarker(latLng, {
          radius: 8,
          color: '#0ea5e9',
          fillColor: '#38bdf8',
          fillOpacity: 0.9,
          weight: 2
        }).addTo(map);
      } else {
        state.robotMarker.setLatLng(latLng);
      }
    }

    function newZoneId() {
      const id = `zone_${state.seqZoneId}`;
      state.seqZoneId += 1;
      return id;
    }

    function makeLayerFromZone(zone, latLngs) {
      const polygon = L.polygon(latLngs, {
        color: zone.enabled ? '#f97316' : '#64748b',
        weight: 3,
        fillOpacity: zone.enabled ? 0.25 : 0.1
      });
      polygon.zoneMeta = {
        id: zone.id,
        type: zone.type || 'no_go',
        enabled: zone.enabled !== false,
      };
      polygon.bindTooltip(zone.id, { permanent: false });
      return polygon;
    }

    function renderMapFromZones(zones) {
      drawnItems.clearLayers();
      if (zones.length === 0) {
        renderZoneList({ zones: [] });
        return;
      }

      zones.forEach((zone) => {
        const polygon = Array.isArray(zone.polygon) ? zone.polygon : [];
        if (polygon.length < 3) return;
        const latLngs = polygon.map((p) => [p.lat, p.lon]);
        const layer = makeLayerFromZone(zone, latLngs);
        drawnItems.addLayer(layer);
      });
    }

    function renderZoneList(doc) {
      const ul = window.document.getElementById('zoneList');
      ul.innerHTML = '';
      const zones = (doc && Array.isArray(doc.zones)) ? doc.zones : [];
      zones.forEach((z) => {
        const li = document.createElement('li');
        const left = document.createElement('span');
        left.textContent = `${z.id} (${z.type || 'no_go'})`;
        const right = document.createElement('span');
        right.className = `badge ${z.enabled === false ? 'off' : 'on'}`;
        right.textContent = z.enabled === false ? 'disabled' : 'enabled';
        li.appendChild(left);
        li.appendChild(right);
        ul.appendChild(li);
      });
    }

    function buildPreviewDocument() {
      const zones = [];
      drawnItems.eachLayer((layer) => {
        const meta = layer.zoneMeta || { id: newZoneId(), type: 'no_go', enabled: true };
        const latLngs = layer.getLatLngs()[0] || [];
        zones.push({
          id: meta.id,
          type: meta.type || 'no_go',
          enabled: meta.enabled !== false,
          polygon: latLngs.map((ll) => ({ lat: ll.lat, lon: ll.lng })),
        });
      });
      return { frame_id: state.frameId, zones: zones };
    }

    function collectZonesFromLayers() {
      const zones = [];
      drawnItems.eachLayer((layer) => {
        const meta = layer.zoneMeta || { id: newZoneId(), type: 'no_go', enabled: true };
        if (!meta.id) meta.id = newZoneId();

        const latLngs = layer.getLatLngs()[0] || [];
        const polygon = latLngs.map((ll) => ({ lat: ll.lat, lon: ll.lng }));
        if (polygon.length >= 3) {
          zones.push({
            id: meta.id,
            type: meta.type || 'no_go',
            enabled: meta.enabled !== false,
            polygon,
          });
        }
      });
      return zones;
    }

    function closeGeoJsonRing(coords) {
      if (!Array.isArray(coords) || coords.length < 3) return [];
      const ring = coords.map((c) => [c[0], c[1]]);
      const first = ring[0];
      const last = ring[ring.length - 1];
      if (!first || !last || first[0] !== last[0] || first[1] !== last[1]) {
        ring.push([first[0], first[1]]);
      }
      return ring;
    }

    function buildGeoJsonFromLayers() {
      const features = [];
      drawnItems.eachLayer((layer) => {
        const meta = layer.zoneMeta || { id: newZoneId(), type: 'no_go', enabled: true };
        if (!meta.id) meta.id = newZoneId();
        const latLngs = layer.getLatLngs()[0] || [];
        const ring = closeGeoJsonRing(latLngs.map((ll) => [ll.lng, ll.lat]));
        if (ring.length >= 4) {
          features.push({
            type: 'Feature',
            properties: {
              id: meta.id,
              type: meta.type || 'no_go',
              enabled: meta.enabled !== false
            },
            geometry: {
              type: 'Polygon',
              coordinates: [ring]
            }
          });
        }
      });
      return {
        type: 'FeatureCollection',
        features
      };
    }

    function pushLayersToServer() {
      const zones = collectZonesFromLayers();
      const geojson = buildGeoJsonFromLayers();
      renderZoneList({ zones });
      send({ op: 'set_zones_geojson', geojson });
    }

    map.on(L.Draw.Event.CREATED, (e) => {
      if (!isGpsMainView()) {
        setStatus('GPS en minimapa: intercambiá a GPS grande para editar zonas', false);
        return;
      }
      const layer = e.layer;
      layer.zoneMeta = { id: newZoneId(), type: 'no_go', enabled: true };
      drawnItems.addLayer(layer);
      renderZoneList(buildPreviewDocument());
      if (document.getElementById('autoSync').checked) {
        pushLayersToServer();
      }
    });

    map.on(L.Draw.Event.EDITED, (e) => {
      if (!isGpsMainView()) {
        setStatus('GPS en minimapa: intercambiá a GPS grande para editar zonas', false);
        return;
      }
      renderZoneList(buildPreviewDocument());
      if (document.getElementById('autoSync').checked) {
        pushLayersToServer();
      }
    });

    map.on(L.Draw.Event.DELETED, (e) => {
      if (!isGpsMainView()) {
        setStatus('GPS en minimapa: intercambiá a GPS grande para editar zonas', false);
        return;
      }
      renderZoneList(buildPreviewDocument());
      if (document.getElementById('autoSync').checked) {
        pushLayersToServer();
      }
    });

    drawnItems.on('click', (evt) => {
      if (!isGpsMainView()) {
        setStatus('GPS en minimapa: intercambiá a GPS grande para editar zonas', false);
        return;
      }
      const layer = evt.layer;
      if (!layer || !layer.zoneMeta) return;
      const current = layer.zoneMeta;
      const nextEnabled = window.confirm(`Toggle zone '${current.id}' enabled/disabled?\nOK=toggle, Cancel=no change`);
      if (nextEnabled) {
        current.enabled = !current.enabled;
        layer.setStyle({ color: current.enabled ? '#f97316' : '#64748b', fillOpacity: current.enabled ? 0.25 : 0.1 });
        renderZoneList(buildPreviewDocument());
        if (document.getElementById('autoSync').checked) {
          pushLayersToServer();
        }
      }
    });

    document.getElementById('connectBtn').addEventListener('click', connectWs);
    document.getElementById('disconnectBtn').addEventListener('click', disconnectWs);
    document.getElementById('refreshBtn').addEventListener('click', () => send({ op: 'get_state' }));
    document.getElementById('pushBtn').addEventListener('click', pushLayersToServer);
    document.getElementById('saveBtn').addEventListener('click', pushLayersToServer);
    document.getElementById('loadBtn').addEventListener('click', () => send({ op: 'load_zones_file' }));
    document.getElementById('clearBtn').addEventListener('click', () => {
      drawnItems.clearLayers();
      pushLayersToServer();
    });

    document.getElementById('goalModeBtn').addEventListener('click', () => {
      if (state.manualControl.enabled) {
        setStatus('Disable manual control before editing waypoints', false);
        return;
      }
      if (!isGpsMainView()) {
        setStatus('GPS en minimapa: intercambiá a GPS grande para editar waypoints', false);
        return;
      }
      setGoalModeUi(!state.goalMode);
    });

    document.getElementById('sendGoalsBtn').addEventListener('click', () => {
      sendCurrentWaypoints();
    });

    document.getElementById('clearGoalsBtn').addEventListener('click', () => {
      clearWaypoints();
      const goalStatusEl = document.getElementById('goalStatus');
      goalStatusEl.textContent = 'Waypoints cleared';
      goalStatusEl.className = 'status';
    });

    document.getElementById('cancelGoalBtn').addEventListener('click', () => {
      send({ op: 'cancel_goal' });
    });

    document.getElementById('manualModeBtn').addEventListener('click', () => {
      if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
        setStatus('WebSocket not connected', false);
        return;
      }
      const nextEnabled = !state.manualControl.enabled;
      send({ op: 'set_manual_mode', enabled: nextEnabled });
    });

    document.getElementById('manualLinearSlider').addEventListener('input', updateManualSliderLabels);
    document.getElementById('manualAngularSlider').addEventListener('input', updateManualSliderLabels);
    document.getElementById('swapViewBtn').addEventListener('click', () => {
      state.primaryView = isGpsMainView() ? 'camera' : 'gps';
      applyViewMode();
    });

    window.addEventListener('keydown', (event) => {
      if (isTextInputFocused()) return;

      const code = event.code;
      const cameraArrowByCode = {
        ArrowUp: 'up',
        ArrowDown: 'down',
        ArrowLeft: 'left',
        ArrowRight: 'right',
      };
      const arrowKey = cameraArrowByCode[code];
      if (arrowKey) {
        event.preventDefault();
        state.cameraArrowKeys[arrowKey] = true;
        if (!event.repeat) {
          scheduleCameraArrowCommand();
        }
        return;
      }

      if (!event.repeat) {
        if (code === 'Minus' || code === 'NumpadSubtract') {
          event.preventDefault();
          send({ op: 'camera_zoom_toggle' });
          return;
        }
      }

      if (!state.manualControl.enabled) return;

      if (code === 'Space') {
        event.preventDefault();
        manualEmergencyStop();
        return;
      }

      if (code === 'KeyW' || code === 'KeyA' || code === 'KeyS' || code === 'KeyD') {
        event.preventDefault();
      }

      if (event.repeat) return;
      if (code === 'KeyW') state.manualKeys.w = true;
      if (code === 'KeyA') state.manualKeys.a = true;
      if (code === 'KeyS') state.manualKeys.s = true;
      if (code === 'KeyD') state.manualKeys.d = true;
      renderManualStatus();
    });

    window.addEventListener('keyup', (event) => {
      const code = event.code;
      if (code === 'ArrowUp') state.cameraArrowKeys.up = false;
      if (code === 'ArrowDown') state.cameraArrowKeys.down = false;
      if (code === 'ArrowLeft') state.cameraArrowKeys.left = false;
      if (code === 'ArrowRight') state.cameraArrowKeys.right = false;
      if (code === 'KeyW') state.manualKeys.w = false;
      if (code === 'KeyA') state.manualKeys.a = false;
      if (code === 'KeyS') state.manualKeys.s = false;
      if (code === 'KeyD') state.manualKeys.d = false;
      if (code === 'Space') {
        manualEmergencyStop();
      }
      renderManualStatus();
    });

    window.addEventListener('beforeunload', () => {
      if (state.ws && state.ws.readyState === WebSocket.OPEN && state.manualControl.enabled) {
        state.ws.send(JSON.stringify({ op: 'set_manual_mode', enabled: false }));
      }
    });

    document.getElementById('snapshotBtn').addEventListener('click', () => {
      send({ op: 'get_nav_snapshot' });
    });
    const ptzAngles = [
      { id: 'ptz_angle_135', angle: 135 },
      { id: 'ptz_angle_90', angle: 90 },
      { id: 'ptz_angle_45', angle: 45 },
      { id: 'ptz_angle_180', angle: 180 },
      { id: 'ptz_angle_0', angle: 0 },
      { id: 'ptz_angle_m135', angle: -135 },
      { id: 'ptz_angle_m90', angle: -90 },
      { id: 'ptz_angle_m45', angle: -45 },
    ];
    for (const item of ptzAngles) {
      const btn = document.getElementById(item.id);
      if (!btn) continue;
      btn.addEventListener('click', () => send({ op: 'camera_pan', angle: item.angle }));
    }
    document.getElementById('ptz_center_zoom').addEventListener('click', () => {
      send({ op: 'camera_zoom_toggle' });
    });
    document.getElementById('snapshotCloseBtn').addEventListener('click', () => {
      document.getElementById('snapshotModal').classList.remove('show');
    });
    document.getElementById('snapshotModal').addEventListener('click', (e) => {
      if (e.target && e.target.id === 'snapshotModal') {
        document.getElementById('snapshotModal').classList.remove('show');
      }
    });

    map.on('mousedown', (e) => {
      if (!state.goalMode || !isGpsMainView()) return;
      if (state.manualControl.enabled) return;
      startGoalDraft(e.latlng);
    });

    map.on('mousemove', (e) => {
      if (!state.goalDraft) return;
      updateGoalDraft(e.latlng);
    });

    map.on('mouseup', () => {
      if (!state.goalDraft) return;
      finishGoalDraft();
    });

    window.addEventListener('mouseup', () => {
      if (!state.goalDraft) return;
      finishGoalDraft();
    });

    document.getElementById('cameraFrame').src = CAMERA_IFRAME_URL;
    applyViewMode();
    updateManualSliderLabels();
    renderManualStatus();
    updateCameraStatusUi(state.cameraStatus);
    renderZoneList({ zones: state.lastZones });
    updateGoalButtonsState();
    updateWaypointStatus();
    renderGoalWaypoints();
  </script>
</body>
</html>
